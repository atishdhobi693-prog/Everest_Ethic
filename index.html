<!DOCTYPE html>
<html>
<head>
<title>Everest Ethic - Nepali Traditional Dresses</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#8B0000,#ff4d4d);
  margin:0;
  text-align:center;
}

header{
  background: rgba(0,0,0,0.3);
  color:white;
  padding:25px;
  font-size:30px;
  font-weight:bold;
  letter-spacing:1px;
  box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:30px;
}

.card{
  background:white;
  width:270px;
  margin:20px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.25);
  padding:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0 5px 0;
  font-size:20px;
  color:#8B0000;
}

.price{
  color:#b30000;
  font-size:18px;
  font-weight:bold;
  margin:8px 0;
}

button{
  background:#25D366;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  margin-top:5px;
}

button:hover{
  background:#1ebe5d;
}

</style>
</head>

<body>

<header>Everest Ethic - Nepali Traditional Dresses</header>

<div class="container">
